name: Repository safety

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: registry-repo-safety-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Scan for probable private-key material
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run secret scan
        run: python3 scripts/scan_for_secrets.py

  preflight:
    name: Key and workflow preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run preflight checks
        run: python3 scripts/preflight.py

  numan-parser:
    name: Parse catalog with Numan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88

      - name: Parse the candidate index with Numan's production parser
        run: >-
          cargo run --locked
          --manifest-path tools/numan-parser-check/Cargo.toml
          -- registry/index.json

  manifest-index-lint:
    name: Lint manifest vs index Nu constraints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: tonythethompson/numan-plugins
          path: numan-plugins
          persist-credentials: false
          sparse-checkout: |
            manifest.json

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Unit test lint script
        run: python3 scripts/test_lint_manifest_index.py

      - name: Compare numan-plugins manifest to registry index
        run: >-
          python3 scripts/lint-manifest-index.py
          --index registry/index.json
          --manifest numan-plugins/manifest.json
